<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIoT-PMO Portal</title>
    <meta http-equiv="refresh" content="3; url=docs/widoco/index.html">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            color-scheme: dark;
            --bg: #11110f;
            --panel: #191a17;
            --panel-2: #20211d;
            --line: #3a3d34;
            --text: #f3f0e8;
            --muted: #b7b2a3;
            --green: #5ee083;
            --amber: #f4b74a;
            --cyan: #6ad7d8;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: 
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                var(--bg);
            background-size: 48px 48px;
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .portal-card {
            max-width: 640px;
            width: 100%;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .portal-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--green), var(--amber));
        }

        .brand-mark {
            width: 60px;
            height: 60px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(94, 224, 131, 0.4);
            background: rgba(94, 224, 131, 0.08);
            color: var(--green);
            border-radius: 12px;
            font-size: 1.8rem;
            margin: 0 auto 20px;
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 10px;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--muted);
            font-size: 1rem;
            margin: 0 0 32px;
        }

        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .choice-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 24px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--panel-2);
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: all 200ms ease;
        }

        .choice-btn:hover {
            transform: translateY(-4px);
            border-color: var(--green);
            background: rgba(94, 224, 131, 0.05);
        }

        .choice-btn i {
            font-size: 2rem;
            color: var(--green);
        }

        .choice-btn.secondary i {
            color: var(--cyan);
        }

        .choice-btn:hover.secondary {
            border-color: var(--cyan);
            background: rgba(106, 215, 216, 0.05);
        }

        .choice-btn strong {
            font-size: 1rem;
            display: block;
        }

        .choice-btn span {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .timer-bar {
            height: 3px;
            background: var(--green);
            width: 100%;
            position: absolute;
            bottom: 0;
            left: 0;
            transform-origin: left;
            animation: countdown 3s linear forwards;
        }

        .redirect-notice {
            font-size: 0.85rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .redirect-notice a {
            color: var(--green);
            text-decoration: none;
            font-weight: 600;
        }

        .redirect-notice a:hover {
            text-decoration: underline;
        }

        @keyframes countdown {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        @media (max-width: 480px) {
            .choices {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="portal-card">
        <div class="brand-mark"><i class="fa-solid fa-diagram-project"></i></div>
        <h1>Industrial IoT Ontology Portal</h1>
        <p class="subtitle">Select a view to explore the IIoT-PMO knowledge graph</p>
        
        <div class="choices">
            <a href="docs/widoco/index.html" class="choice-btn" id="widocoLink">
                <i class="fa-solid fa-file-invoice"></i>
                <strong>WIDOCO Docs</strong>
                <span>Auto-generated HTML documentation</span>
            </a>
            <a href="console.html" class="choice-btn secondary" id="consoleLink">
                <i class="fa-solid fa-chart-line"></i>
                <strong>Ontology Console</strong>
                <span>Interactive SVG visualization dashboard</span>
            </a>
        </div>

        <div class="redirect-notice">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
            <span>Redirecting to WIDOCO Docs in <span id="countdown">3</span>s.</span>
            <a href="#" id="cancelRedirect">Cancel auto-redirect</a>
        </div>
        <div class="timer-bar" id="timerBar"></div>
    </div>

    <script>
        let seconds = 3;
        const countdownEl = document.getElementById("countdown");
        const timerBar = document.getElementById("timerBar");
        const cancelBtn = document.getElementById("cancelRedirect");

        const interval = setInterval(() => {
            seconds--;
            if (seconds >= 0) {
                countdownEl.textContent = seconds;
            }
            if (seconds === 0) {
                clearInterval(interval);
            }
        }, 1000);

        // Cancel redirect if requested
        cancelBtn.addEventListener("click", (e) => {
            e.preventDefault();
            clearInterval(interval);
            timerBar.style.animation = "none";
            timerBar.style.display = "none";
            document.querySelector(".redirect-notice").innerHTML = '<span>Auto-redirect cancelled. Access views above.</span>';
            // Stop HTTP refresh meta redirect by removing the element
            const meta = document.querySelector('meta[http-equiv="refresh"]');
            if (meta) meta.remove();
        });
    </script>
</body>
</html>
